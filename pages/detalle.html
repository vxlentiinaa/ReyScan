<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalle — REYSCAN</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="logo">♛ REY<span>SCAN</span></a>
    <div class="nav-links">
      <a href="../index.html">Inicio</a>
      <a href="inventario.html" class="active">Inventario</a>
      <a href="movimientos.html">Movimientos</a>
      <a href="ubicaciones.html">Ubicaciones</a>
    </div>
    <div class="nav-brand">Bronces Rey</div>
  </nav>

  <main class="container">

    <div style="margin-bottom:20px">
      <a href="inventario.html" class="link-more" style="font-size:12px">← Volver al inventario</a>
    </div>

    <div id="detalle-content">
      <p style="color:var(--text3)">Cargando pieza...</p>
    </div>

  </main>

  <footer class="footer">
    <span>♛ REYSCAN · Bronces Rey © 2026</span>
    <span>Proyecto de Diseño Industrial — trabajo en proceso</span>
  </footer>

  <script src="../js/data.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const pieza = PIEZAS.find(p => p.id === id);
    const movs = MOVIMIENTOS.filter(m => m.pieza === id);

    if (!pieza) {
      document.getElementById('detalle-content').innerHTML = '<p style="color:var(--danger)">Pieza no encontrada.</p>';
    } else {
      const bajo = pieza.stock <= pieza.minStock;
      const stockColor = pieza.stock <= pieza.minStock / 2 ? 'var(--danger)' : bajo ? 'var(--warning)' : 'var(--success)';

      document.title = pieza.name + ' — REYSCAN';
      document.getElementById('detalle-content').innerHTML = `

        <div class="page-title">
          <h1>${pieza.name}</h1>
          <p class="subtitle">CÓD: ${pieza.code}</p>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">

          <!-- INFO -->
          <div>
            <div class="section-title">Especificaciones</div>
            <div class="table-wrapper">
              <table class="data-table">
                <tbody>
                  <tr><td class="muted">Material</td><td><strong>${pieza.material}</strong></td></tr>
                  <tr><td class="muted">Tipo</td><td>${pieza.tipo}</td></tr>
                  <tr><td class="muted">Diámetro</td><td>${pieza.diametro}</td></tr>
                  <tr><td class="muted">Stock actual</td><td style="color:${stockColor};font-weight:800;font-size:18px">${pieza.stock} uds</td></tr>
                  <tr><td class="muted">Stock mínimo</td><td>${pieza.minStock} uds</td></tr>
                  <tr><td class="muted">Estado</td><td>${bajo ? '<span class="badge bajo">Stock bajo</span>' : '<span class="badge ok">OK</span>'}</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- UBICACIÓN -->
          <div>
            <div class="section-title">Ubicación</div>
            <div class="shelf-section" style="margin-bottom:0">
              <h3 style="color:var(--accent);font-size:22px;font-weight:800">${pieza.ubicacion}</h3>
              <p>Estantería ${pieza.estante} / Nivel ${pieza.nivel} / Caja ${pieza.caja}</p>
              <a href="ubicaciones.html?id=${pieza.id}" class="btn btn-secondary" style="font-size:11px;display:inline-block;margin-top:4px">Ver en mapa →</a>
            </div>
          </div>
        </div>

        <!-- MOVIMIENTOS -->
        <div class="section-title">Historial de movimientos</div>
        ${movs.length ? `
          <div class="table-wrapper" style="margin-bottom:16px">
            <table class="data-table">
              <thead>
                <tr><th>Fecha</th><th>Tipo</th><th>Cantidad</th><th>Responsable</th><th>Observación</th></tr>
              </thead>
              <tbody>
                ${movs.map(m => `<tr>
                  <td class="muted">${m.fecha}</td>
                  <td><span class="badge ${m.tipo}">${m.tipo}</span></td>
                  <td style="font-weight:700;color:${m.tipo==='entrada'?'var(--success)':'var(--danger)'}">
                    ${m.tipo==='entrada'?'+':'-'}${m.cantidad} uds
                  </td>
                  <td>${m.responsable}</td>
                  <td class="muted">${m.observacion}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        ` : '<p style="color:var(--text3);font-size:12px;margin-bottom:16px">Sin movimientos registrados aún.</p>'}

        <a href="movimientos.html#registrar" class="btn btn-primary">Registrar movimiento</a>
      `;
    }
  </script>
</body>
</html>
